pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

include ":app"

def flutterPluginsFile = new File(settingsDir, '../.flutter-plugins-dependencies')
if (flutterPluginsFile.exists()) {
    def json = new groovy.json.JsonSlurper().parseText(flutterPluginsFile.text)
    json.plugins.android.each { plugin ->
        include ":${plugin.name}"
        project(":${plugin.name}").projectDir = new File(plugin.path, 'android')
    }
}




